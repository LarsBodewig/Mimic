buildscript {
    group = "$groupId"
}

plugins {
    id 'eclipse'
    id 'java-gradle-plugin'
    id 'maven-publish'
    id 'signing' // is this necessary?
}

repositories {
    mavenLocal()
    mavenCentral()
    gradlePluginPortal()
}

java {
    sourceCompatibility = JavaVersion.VERSION_19
    withJavadocJar()
    withSourcesJar()
}

gradlePlugin {
    plugins {
        mimic {
            id = 'dev.bodewig.mimic.mimic-gradle-plugin'
            displayName = 'mimic-gradle-plugin'
            description = 'Create reflective accessors for third party classes'
            tags.set(['reflection', 'codegen', 'java', 'wrapper'])
            implementationClass = 'dev.bodewig.mimic.gradle.plugin.MimicPlugin'
            website = 'https://github.com/LarsBodewig/Mimic'
            vcsUrl = 'https://github.com/LarsBodewig/Mimic.git'
        }
    }
}

// doesn't work - is this even necessary? 
project.gradle.taskGraph.whenReady {
    if (project.gradle.taskGraph.allTasks.contains(':publishToMavenLocal')) {
		println "does this get executed?"
		signing {
		    def gpgKey = System.getenv('gpgKey')
		    def gpgPass = System.getenv('gpgPass')
		    useInMemoryPgpKeys(gpgKey, gpgPass)
			sign publishing.publications
	    }
	}
}

publishing {
    repositories {
        maven {
            def releasesRepoUrl = 'https://s01.oss.sonatype.org/service/local/staging/deploy/maven2/'
            def snapshotsRepoUrl = 'https://s01.oss.sonatype.org/content/repositories/snapshots'
            url = "$version".endsWith('SNAPSHOT') ? snapshotsRepoUrl : releasesRepoUrl
        }
    }
